---
- name: Load password rotation state
  slurp:
    src: /tmp/password_rotation_state.json
  register: state_file
  delegate_to: localhost
  run_once: true

- name: Parse password rotation state
  set_fact:
    rotation_state: "{{ state_file.content | b64decode | from_json }}"

- name: Initialize updated items
  set_fact:
    updated_items: []

- name: Update datasource password
  include_tasks: process_group.yml
  loop: "{{ rotation_state }}"
  loop_control:
    loop_var: rotation_item

- name: Save updated password rotation state
  copy:
    dest: /tmp/password_rotation_state.json
    content: "{{ updated_items | to_nice_json }}"
    mode: "0644"
  delegate_to: localhost
  run_once: true

- name: Show updated state
  debug:
    var: updated_items
