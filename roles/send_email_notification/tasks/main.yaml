- name: Send password rotation report email
  vars:
    rotation_items: "{{ password_rotation_items }}"
    mail_recipients: "{{ rotation_items | map(attribute='user_details.email_recipients') | flatten | unique | join(', ') }}"
  mail:
    host: "{{ smtp_server }}"
    port: "{{ smtp_port }}"
    from: "{{ email_sender }}"
    to: "{{ mail_recipients }}"
    subject: "Password Rotation Results"
    subtype: html
    body: |
      <html>
      <body>
        <p>Dear Team,</p>
        <p>Here is the latest password rotation report:</p>
        <table border="1" cellpadding="4" cellspacing="0" style="border-collapse: collapse;">
          <thead>
            <tr style="background-color: #f2f2f2;">
              <th>Group</th>
              <th>Hosts</th>
              <th>User</th>
              {% if rotation_items[0].user_details.db_type is defined %}
                <th>DB Type</th>
              {% endif %}
              <th>Apply Success</th>
              <th>SecretServer Success</th>
              <th>Rotation Errors</th>
              <th>Rollback Success</th>
              <th>Rollback Errors</th>
              <th>Secret Server Link</th>
            </tr>
          </thead>
          <tbody>
          {% for item in rotation_items %}
            {% set apply_ok = item.apply_success if item.apply_success is defined else item.password_success %}
            {% set rotation_errors_list = item.rotation_errors | default([]) %}
            {% if rotation_errors_list | length == 0 and item.error_msg_password_applied is defined %}
              {% set rotation_errors_list = [{'msg': item.error_msg_password_applied}] %}
            {% endif %}
            {% set rollback_ok = item.rollback_success | default(false) %}
            {% set rollback_errors_list = item.rollback_errors | default([]) %}
            {% if rollback_errors_list | length == 0 and item.failed_rollbacks is defined %}
              {% set rollback_errors_list = item.failed_rollbacks %}
            {% endif %}
            <tr>
              <td>{{ item.group }}</td>
              <td>{{ groups[item.group] | join(', ') }}</td>
              <td>{{ item.user_details.user }}</td>
              {% if rotation_items[0].user_details.db_type is defined %}
                <td>{{ item.user_details.db_type | default('-') }}</td>
              {% endif %}
              <td>{{ apply_ok }}</td>
              <td>{{ item.secretserver_success }}</td>
              <td>{{ rotation_errors_list | map(attribute='msg') | join('; ') | default('-') }}</td>
              <td>{{ rollback_ok }}</td>
              <td>{{ rollback_errors_list | map(attribute='msg') | join('; ') | default('-') }}</td>
              <td>
              <a href="{{ secret_server_base_url }}/app/#/secrets/{{ item.secret_details.secret_id }}/general"
                 target="_blank" style="text-decoration: none; color: #1a73e8;">
                View {{ item.secret_details.secret_name }}
              </a>
              </td>
            </tr>
          {% endfor %}
          </tbody>
        </table>
        <p>Regards,<br/>Automation Team</p>
      </body>
      </html>
  when: mail_recipients | length > 0