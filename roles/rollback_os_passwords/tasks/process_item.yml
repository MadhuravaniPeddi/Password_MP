- block:
    - name: Update password on target hosts
      shell: echo "{{ rotation_item.retrieved_password }}" | passwd --stdin {{ rotation_item.user_details['user'] | upper }}
      become: yes
      delegate_to: "{{ target_host }}"

    - name: Mark rollback success on {{ target_host }}
      set_fact:
        # if still true, remains true
        rollback_os_success: "{{ rollback_os_success and true }}"
  rescue:
    - name: Capture rollback failure on {{ target_host }}
      set_fact:
        rollback_os_success: false
        failed_rollbacks: >-
          {{ failed_rollbacks + [ { 'host': target_host, 'msg': (ansible_failed_result.msg | default(ansible_failed_result.stderr)) } ] }}
