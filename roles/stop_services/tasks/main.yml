---
- name: Create log directory if it doesn't exist
  file:
    path: "{{ log_dir }}"
    state: directory
    mode: '0755'
  run_once: yes
  delegate_to: "{{ groups['all'][0] }}"

- name: Stop services
  shell: |
    . {{ APP_BASE }}/{{ APP_ENV }} run
    echo {{ TGT_WEBLOGIC_PASS }} | $ADMIN_SCRIPTS_HOME/adstpall.sh apps/{{ TGT_APPS_PASS }}
  args:
    executable: /bin/bash
  register: stop_services_result
  ignore_errors: yes

- name: Log stop services output
  shell: |
    cat >> {{ stop_services_log }} << 'EOF'
    ============================================
    STOP SERVICES - {{ current_date }}
    ============================================
    STDOUT:
    {{ stop_services_result.stdout | default('') }}

    STDERR:
    {{ stop_services_result.stderr | default('') }}

    Return Code: {{ stop_services_result.rc | default(-1) }}
    ============================================

    EOF
  when: stop_services_result is defined

- name: Check if services stopped successfully
  set_fact:
    services_stopped: >-
      {{
        'All enabled services on this node are stopped.'
        in (stop_services_result.stdout + stop_services_result.stderr)
      }}

- name: Fail if services did not stop
  fail:
    msg: "Services failed to stop. 'All enabled services on this node are stopped.' message not found in output."
  when: not services_stopped

- name: Wait for specified duration
  pause:
    minutes: "{{ pause_duration_minutes }}"
  when: services_stopped

- name: Check for remaining EBS processes
  shell: |
    ps -ef | egrep "{{ ebs_process_patterns }}" | grep -v grep
  register: process_check
  changed_when: false
  ignore_errors: yes
  when: services_stopped

- name: Log process check output
  shell: |
    cat >> {{ stop_services_log }} << 'EOF'
    ============================================
    PROCESS CHECK - {{ current_date }}
    ============================================
    STDOUT:
    {{ process_check.stdout | default('') }}

    STDERR:
    {{ process_check.stderr | default('') }}

    Return Code: {{ process_check.rc | default(-1) }}
    ============================================

    EOF
  when: services_stopped

- name: Kill remaining EBS processes
  shell: |
    ps -ef | egrep "{{ ebs_process_patterns }}" | grep -v grep | awk '{print $2}' | xargs -r kill -9
  register: kill_result
  ignore_errors: yes
  when:
    - services_stopped
    - process_check.stdout | trim != ""

- name: Log kill processes output
  shell: |
    cat >> {{ stop_services_log }} << 'EOF'
    ============================================
    KILL PROCESSES - {{ current_date }}
    ============================================
    STDOUT:
    {{ kill_result.stdout | default('') }}

    STDERR:
    {{ kill_result.stderr | default('') }}

    Return Code: {{ kill_result.rc | default(-1) }}
    ============================================

    EOF
  when:
    - services_stopped
    - process_check.stdout | trim != ""

- name: Verify all EBS processes are stopped
  shell: |
    ps -ef | egrep "{{ ebs_process_patterns }}" | grep -v grep
  register: verify_processes
  changed_when: false
  failed_when: verify_processes.stdout | trim != ""
  when: services_stopped

- name: Log verification output
  shell: |
    cat >> {{ stop_services_log }} << 'EOF'
    ============================================
    PROCESS VERIFICATION - {{ current_date }}
    ============================================
    STDOUT:
    {{ verify_processes.stdout | default('') }}

    STDERR:
    {{ verify_processes.stderr | default('') }}

    Return Code: {{ verify_processes.rc | default(-1) }}
    ============================================

    EOF
  when: services_stopped
