- name: Validate WebLogic login
  shell: |
    source {{ EBS_ENV_FILE }}
    WLST=$FMW_HOME/oracle_common/common/bin/wlst.sh

    $WLST <<EOF
    try:
        connect('weblogic','{{ target_password }}','{{ admin_url }}')
        print('VALID')
        disconnect()
    except:
        print('INVALID')
        exit()
    EOF
  args:
    executable: /bin/bash
  register: wls_validation
  changed_when: false
  failed_when: wls_validation.rc != 0 or 'VALID' not in wls_validation.stdout
  delegate_to: "{{ target_host }}"