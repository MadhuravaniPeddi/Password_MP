- name: Change APPS password using AFPASSWD
  shell: |
    source {{ EBS_ENV_FILE }}
    {
      printf '%s\n' "{{ appsuser_password }}"
      printf '%s\n' "{{ system_password }}"
      printf '%s\n' "{{ target_password }}"
      printf '%s\n' "{{ target_password }}"
    } | AFPASSWD -c apps@{{ DB_SID }} -s APPLSYS
  args:
    executable: /bin/bash
  register: apps_pwd_change
  no_log: true
  failed_when: apps_pwd_change.rc != 0 or 'ORA-' in apps_pwd_change.stdout or 'ERROR' in apps_pwd_change.stdout
  delegate_to: "{{ target_host }}"

- name: Run AutoConfig after APPS password change
  shell: |
    source {{ EBS_ENV_FILE }}
    {{ ADMIN_SCRIPTS_HOME }}/adautocfg.sh
  args:
    executable: /bin/bash
  register: autoconfig_result
  failed_when: autoconfig_result.rc != 0 or 'ORA-' in autoconfig_result.stdout or 'ERROR' in autoconfig_result.stdout
  delegate_to: "{{ target_host }}"

- name: Update WLS datasource password for APPS
  shell: |
    source {{ EBS_ENV_FILE }}
    perl $FND_TOP/patch/115/bin/txkManageDBConnectionPool.pl <<EOF
    updateDSPassword
    apps
    {{ target_password }}
    EOF
  args:
    executable: /bin/bash
  register: wls_ds_update
  failed_when: wls_ds_update.rc != 0 or 'ORA-' in wls_ds_update.stdout or 'ERROR' in wls_ds_update.stdout
  delegate_to: "{{ target_host }}"