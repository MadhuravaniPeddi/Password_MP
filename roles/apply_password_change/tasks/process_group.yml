---
- name: Find primary host
  set_fact:
    target_host: "{{ item }}"
  loop: "{{ groups[group_name] }}"
  when: hostvars[item].primary | default(false) | bool

- name: Show target host
  debug:
    msg: "{{ group_name }} -> {{ target_host }}"

- name: Resolve OLAM passwords
  set_fact:
    apps_password: >-
      {{ lookup('vars', hostvars[target_host].olam_fields.apps_pass) }}

    system_password: >-
      {{ lookup('vars', hostvars[target_host].olam_fields.system_pass) }}

    target_password: >-
      {{ lookup('vars', hostvars[target_host].olam_fields.apps_pass_gen) }}

    weblogic_password: >-
      {{ lookup('vars', hostvars[target_host].olam_fields.weblogic_pass) }}

- name: Change APPS password using FNDCPASS
  shell: |
    source {{ hostvars[target_host].EBS_ENV_FILE }} run

    FNDCPASS \
    apps/{{ apps_password }} \
    0 Y \
    system/{{ system_password }} \
    SYSTEM APPLSYS \
    {{ target_password }}
  args:
    executable: /bin/bash
  register: apps_pwd_change
  delegate_to: "{{ target_host }}"
  become: yes
  become_user: "{{ hostvars[target_host].ebs_owner }}"
  failed_when: >
    apps_pwd_change.rc != 0 or
    'ORA-' in apps_pwd_change.stdout or
    'ERROR' in apps_pwd_change.stdout

- name: Show output
  debug:
    var: apps_pwd_change.stdout_lines
