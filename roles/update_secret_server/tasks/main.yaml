- name: Retrieve group_name from hostvars if missing
  set_fact:
    group_name: "{{ group_name | default(hostvars[inventory_hostname].global_group_name, true) }}"




- name: Debug - Check if group_name is received in update_secret_server
  debug:
    msg: "Received group_name: {{ group_name | default('NOT RECEIVED') }}"


# - name: Set group_name variable correctly
#   set_fact:
#     group_name1: "{{ group_name }}"

- name: Store group_name globally before calling update_secret_server
  set_fact:
    global_group_name: "{{ group_name }}"


- name: Debug - Show resolved group_name correctly
  debug:
    msg: "Resolved group name: {{ global_group_name }} (Original: {{ group_name }})"

- name: Update password in Secret Server for each group
  include_role:
    name: update_password
  vars:
    secret_name: "{{ user_details.secret_name }}"
    final_password: "{{ final_pwd }}"
    secret_id: "{{ found_secret_id }}"
    group_name: "{{ group_name1 }}"

- name: Send Email Notification
  include_role:
    name: send_email_notification
  vars:
    group_name: "{{ group_name1 }}"
