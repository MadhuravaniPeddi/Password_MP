---
- block:

    - name: Initialize Secret Server status
      set_fact:
        secretserver_success: false
        error_msg_secret: ""

    - name: Build Secret Server URL
      set_fact:
        api_url: "{{ secret_server_base_url }}/api/v1/secrets/{{ rotation_item.secret_details.secret_id }}"

    - name: Update Secret Server
      uri:
        url: "{{ api_url }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ tkn }}"
          Content-Type: "application/json"
        body_format: json
        body:
          id: "{{ rotation_item.secret_details.secret_id }}"
          name: "{{ rotation_item.user_details.secret_name }}"
          siteId: "{{ rotation_item.secret_details.site_id }}"
          folderId: "{{ rotation_item.secret_details.folder_id }}"
          items:
            - fieldId: "{{ rotation_item.secret_details.field_id }}"
              itemId: "{{ rotation_item.secret_details.item_id }}"
              itemValue: "{{ rotation_item.generated_password }}"
          active: true
          comment: "{{ rotation_item.secret_details.comment }}"
      register: update_response
      delegate_to: localhost
      until: update_response.status in [200,201,204]
      retries: 3
      delay: 5
      failed_when: update_response.status not in [200,201,204]

    - name: Mark Secret Server success
      set_fact:
        secretserver_success: true

  rescue:

    - name: Capture Secret Server failure
      set_fact:
        secretserver_success: false
        error_msg_secret: "{{ ansible_failed_result.msg | default('Secret Server update failed') }}"

  always:

    - name: Save updated item
      set_fact:
        updated_items: >-
          {{
            updated_items +
            [
              rotation_item | combine({
                'secretserver_success': secretserver_success,
                'error_msg_secret': error_msg_secret
              })
            ]
          }}
