- name: Rotate passwords for each inventory group
  hosts: all
  gather_facts: no
  run_once: true  # Ensures we collect data only once

  tasks:
    - name: Debug - Show all inventory groups
      debug:
        msg: "Inventory groups: {{ groups.keys() | list }}"

    - name: Debug - Show hosts in each group
      debug:
        msg: "Hosts in group {{ item }}: {{ groups[item] }}"
      loop: "{{ groups.keys() | list }}"

    - name: Generate a new password for each group
      set_fact:
        final_password: "{{ lookup('password', '/dev/null length=16 chars=ascii_letters,digits') }}"
      loop: "{{ groups.keys() | list }}"
      loop_control:
        loop_var: target_group

    - name: Debug - Show generated password per group
      debug:
        msg: "Generated password for group {{ target_group }}: {{ final_password }}"
      loop: "{{ groups.keys() | list }}"
      loop_control:
        loop_var: target_group


