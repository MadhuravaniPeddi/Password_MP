- name: Rotate passwords for each inventory group
  hosts: all
  gather_facts: no
  run_once: true  # Ensures the task runs once and applies globally

  tasks:
    - name: Filter only the groups with hosts in the current play (limited groups)
      set_fact:
        limited_groups: "{{ groups.keys() | select('search', '^(?!all$|ungrouped$)') | list }}"

    - name: Debug - Show only groups in the limit
      debug:
        msg: "Processing inventory groups: {{ limited_groups }}"

    - name: Debug - Show hosts in each selected group
      debug:
        msg: "Hosts in group {{ item }}: {{ groups[item] }}"
      loop: "{{ limited_groups }}"

    - name: Generate a new password for each group
      set_fact:
        final_password_{{ item }}: "{{ lookup('password', '/dev/null length=16 chars=ascii_letters,digits') }}"
      loop: "{{ limited_groups }}"
      loop_control:
        loop_var: item

    - name: Debug - Show generated password per group
      debug:
        msg: "Generated password for group {{ item }}: {{ hostvars['localhost']['final_password_' ~ item] }}"
      loop: "{{ limited_groups }}"
      loop_control:
        loop_var: item



