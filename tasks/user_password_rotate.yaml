- name: Get the user details from inventory variables
  set_fact:
    group_username: "{{ hostvars[inventory_hostname].username }}"
    group_secret_name: "{{ hostvars[inventory_hostname].secret_name }}"
    group_email_recipients: "{{ hostvars[inventory_hostname].email_recipients }}"
    group_secret_id: ""

- name: Retrieve secret ID from Secret Server
  include_role:
    name: update_password
  vars:
    secret_name: "{{ group_secret_name }}"
    final_password: "{{ hostvars['global_passwords'].group_pwds[group_name] }}"

- name: Collect hostnames for email
  set_fact:
    rotated_hosts: "{{ rotated_hosts | default([]) + [inventory_hostname] }}"
  delegate_to: localhost
  run_once: true

- name: Send a consolidated email for each group
  community.general.mail:
    host: "{{ smtp_server }}"
    port: "{{ smtp_port }}"
    from: "{{ email_sender }}"
    to: "{{ group_email_recipients | join(', ') }}"
    subject: "Password Rotation - Group: {{ group_name }}"
    body: |
      Hi,

      The password for the following user has been successfully rotated in group: **{{ group_name }}**

      Hosts:
      {% for host in rotated_hosts %}
        - {{ host }}
      {% endfor %}

      User: {{ group_username }}
      Secret Name: {{ group_secret_name }}
      Secret ID: {{ group_secret_id }}
      URL: https://centroid.secretservercloud.com/app/#/secrets/{{ group_secret_id }}/general

      Thanks & Regards,
      Automation Team
  delegate_to: localhost
  run_once: true
