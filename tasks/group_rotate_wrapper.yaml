# tasks/group_rotate_wrapper.yaml

- name: Set current group name for use in roles
  set_fact:
    current_group_name: "{{ target_group }}"

- name: Debug current group
  debug:
    msg: "Processing group: {{ current_group_name }}"

- name: Include roles in order
  include_role:
    name: 1fetch_existing_pwd


- name: Include generate_password role
  include_role:
    name: 2generate_password

- name: Include rotate_password role
  include_role:
    name: 3rotate_password

- name: Include update_secret_server role
  include_role:
    name: 4update_secret_server

- name: Check if new password equals old (simulate failure condition)
  set_fact:
    rotation_failed: "{{ existing_pwd == new_password }}"

- name: Rollback if rotation failed
  include_role:
    name: 5rollback_password
  when: rotation_failed

- name: Notify users
  include_role:
    name: 6notify_users
  vars:
    result: "{{ 'FAILED' if rotation_failed else 'SUCCESS' }}"








